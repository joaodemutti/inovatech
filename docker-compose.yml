version: "3.9"
services:
  postgres:
    container_name: inovatech-db
    image: postgres:16
    environment:
      POSTGRES_USER: inovatech
      POSTGRES_PASSWORD: senha
      POSTGRES_DB: inovatech_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inovatech -d inovatech_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    container_name: inovatech-api
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
