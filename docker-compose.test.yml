services:
  postgres-test:
    container_name: inovatech-db-test
    image: postgres:17
    environment:
      POSTGRES_USER: inovatech
      POSTGRES_PASSWORD: senha
      POSTGRES_DB: inovatech_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inovatech -d inovatech_test"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend-api:
    container_name: inovatech-api-e2e
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://inovatech:senha@postgres-test:5432/inovatech_test
      TEST_DATABASE_URL: postgresql+psycopg://inovatech:senha@postgres-test:5432/inovatech_test
      JWT_SECRET: test_secret_key_only_for_tests
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
      FRONTEND_URL: http://localhost:3000
    depends_on:
      postgres-test:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: sh ./entrypoint.sh
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/', timeout=2).read()\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 30

  api-e2e:
    container_name: inovatech-api-e2e-tests
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      E2E_API_URL: http://backend-api:8000
      E2E_DEFAULT_PASSWORD: Inovatech@2026
      E2E_GESTOR_LOGIN: roberto
      E2E_RECEPCIONISTA_LOGIN: ana
      E2E_MEDICO_LOGIN: carlos
      E2E_PACIENTE_LOGIN: maria
      E2E_PACIENTE_JOAO_LOGIN: joao
    depends_on:
      backend-api:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - test-reports:/app/reports
    command: >
      sh -c "
        pip install -r requirements-test.txt -q &&
        pytest tests_e2e
      "

volumes:
  test-reports:
