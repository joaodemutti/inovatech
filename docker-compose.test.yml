version: "3.9"

services:
  postgres-test:
    container_name: inovatech-db-test
    image: postgres:17
    environment:
      POSTGRES_USER: inovatech
      POSTGRES_PASSWORD: senha
      POSTGRES_DB: inovatech_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data   # banco em memória — descartado ao parar
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inovatech -d inovatech_test"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend-test:
    container_name: inovatech-api-test
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://inovatech:senha@postgres-test:5432/inovatech_test
      TEST_DATABASE_URL: postgresql+psycopg://inovatech:senha@postgres-test:5432/inovatech_test
      JWT_SECRET: test_secret_key_only_for_tests
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
      FRONTEND_URL: http://localhost:3000
    depends_on:
      postgres-test:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - test-reports:/app/reports
    command: >
      sh -c "
        pip install -r requirements-test.txt -q &&
        pytest
          --cov=app
          --cov-report=html:reports/coverage
          --cov-report=term-missing
          --html=reports/report.html
          --self-contained-html
          -v
          --tb=short
      "

volumes:
  test-reports:
